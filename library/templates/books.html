<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Manage Books</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <span class="navbar-brand fs-4">
            📚 Library Management System
        </span>

        <a href="/librarian"
           class="btn btn-light">
            Dashboard
        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            📚 Manage Books
        </h2>

        <form method="POST">

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Book Title
                    </label>

                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Author
                    </label>

                    <input
                        type="text"
                        name="author"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        ISBN
                    </label>

                    <input
                        type="text"
                        name="isbn"
                        class="form-control"
                        required>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Category
                    </label>

                    <input
                        type="text"
                        name="category"
                        class="form-control"
                        placeholder="Example: Computer Network"
                        required>

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">
                        Quantity
                    </label>

                    <input
                        type="number"
                        name="quantity"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-3 d-grid align-items-end">

                    <button
                        class="btn btn-success mt-4">

                        Add Book

                    </button>

                </div>

            </div>

        </form>

    </div>

    <br>

    <div class="card shadow p-4">

        <h3 class="mb-3">
            📖 Book List
        </h3>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Title</th>

                    <th>Author</th>

                    <th>ISBN</th>

                    <th>Category</th>

                    <th>Quantity</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

            {% for book in books %}

                <tr>

                    <td>{{ book.id }}</td>

                    <td>{{ book.title }}</td>

                    <td>{{ book.author }}</td>

                    <td>{{ book.isbn }}</td>

                    <td>{{ book.category }}</td>

                    <td>{{ book.quantity }}</td>

                    <td>

                        <a
                        href="/delete_book/{{ book.id }}"
                        class="btn btn-danger btn-sm"
                        onclick="return deleteConfirm()">

                            Delete

                        </a>

                    </td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
