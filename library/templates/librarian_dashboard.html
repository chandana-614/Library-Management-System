<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Librarian Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .navbar{
            background:#0d6efd;
        }

        .card{
            border:none;
            border-radius:15px;
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
        }

        h2{
            font-weight:bold;
        }
    </style>

</head>

<body>

<nav class="navbar navbar-dark">

    <div class="container-fluid">

        <span class="navbar-brand fs-3">
            📚 Library Management System
        </span>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>

    </div>

</nav>

<div class="container mt-5">

    <h2 class="mb-4">
        Welcome Librarian 👨‍💼
    </h2>

    <!-- First Row -->

    <div class="row">

        <div class="col-md-4 mb-4">

            <div class="card shadow text-center p-4">

                <h3>📚</h3>

                <h5>Books</h5>

                <a href="/books" class="btn btn-primary mt-3">

                    Manage Books

                </a>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card shadow text-center p-4">

                <h3>📖</h3>

                <h5>Issue Book</h5>

                <a href="/issue" class="btn btn-success mt-3">

                    Issue Book

                </a>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card shadow text-center p-4">

                <h3>📕</h3>

                <h5>Return Book</h5>

                <a href="/return" class="btn btn-warning mt-3">

                    Return Book

                </a>

            </div>

        </div>

    </div>

    <!-- Second Row -->

    <div class="row">

        <div class="col-md-6 mb-4">

            <div class="card shadow text-center p-4">

                <h3>💰</h3>

                <h5>Fine Details</h5>

                <a href="/fines" class="btn btn-danger mt-3">

                    View Fines

                </a>

            </div>

        </div>

        <div class="col-md-6 mb-4">

            <div class="card shadow text-center p-4">

                <h3>📊</h3>

                <h5>Reports</h5>

                <a href="/reports" class="btn btn-info mt-3">

                    View Reports

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
